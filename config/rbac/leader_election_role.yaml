# Permissions the controller-manager needs for leader election.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kuberag-leader-election
  namespace: kuberag-system
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kuberag-leader-election
  namespace: kuberag-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kuberag-leader-election
subjects:
  - kind: ServiceAccount
    name: kuberag-controller-manager
    namespace: kuberag-system
