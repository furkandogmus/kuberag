# ServiceAccount + RBAC for ingestion/eval/cleanup Jobs.
#
# Apply in every namespace where you create KnowledgeBases:
#   kubectl apply -f config/rbac/worker_rbac.yaml -n <namespace>
#
# The worker only needs to publish its result ConfigMap and read the eval dataset.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kuberag-worker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kuberag-worker
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kuberag-worker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kuberag-worker
subjects:
  - kind: ServiceAccount
    name: kuberag-worker
