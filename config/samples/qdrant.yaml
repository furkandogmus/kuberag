# Minimal in-cluster Qdrant for local testing. Not for production.
# EPHEMERAL: no PVC — all Qdrant data is lost on pod restart.
# For persistence, use Qdrant's official Helm chart or add a PersistentVolumeClaim.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  labels:
    app: qdrant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.11.3
          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
spec:
  selector:
    app: qdrant
  ports:
    - name: http
      port: 6333
      targetPort: 6333
    - name: grpc
      port: 6334
      targetPort: 6334
