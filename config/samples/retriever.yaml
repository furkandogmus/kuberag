apiVersion: rag.furkan.dev/v1alpha1
kind: Retriever
metadata:
  name: company-docs
  namespace: default
spec:
  knowledgeBaseRef:
    name: company-docs
  topK: 8
  scoreThresholdPercent: 20
  replicas: 2
  rerank:
    enabled: true
    model: Xenova/ms-marco-MiniLM-L-6-v2
