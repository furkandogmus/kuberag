---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: vectorindices.rag.furkan.dev
spec:
  group: rag.furkan.dev
  names:
    kind: VectorIndex
    listKind: VectorIndexList
    plural: vectorindices
    shortNames:
    - vi
    singular: vectorindex
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.health
      name: Health
      type: string
    - jsonPath: .status.pointCount
      name: Points
      type: integer
    - jsonPath: .status.dimension
      name: Dim
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: VectorIndex tracks the health and size of a vector store collection.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              VectorIndexSpec describes a managed collection in a vector store. The operator
              creates one VectorIndex per KnowledgeBase to track collection health and size
              independently of the ingestion lifecycle.
            properties:
              dimension:
                description: Dimension is the expected vector dimension for the collection.
                type: integer
              knowledgeBaseRef:
                description: KnowledgeBaseRef names the owning KnowledgeBase (same
                  namespace).
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              probeIntervalSeconds:
                default: 60
                description: ProbeIntervalSeconds controls how often health is checked.
                minimum: 10
                type: integer
              store:
                description: VectorStoreSpec describes where embeddings are written.
                properties:
                  collection:
                    description: Collection (or table) name. Defaults to the KnowledgeBase
                      name.
                    type: string
                  credentialsSecretRef:
                    description: CredentialsSecretRef holds a password/API key for
                      the store when needed.
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  distance:
                    default: cosine
                    description: DistanceMetric enumerates supported vector distance
                      metrics.
                    enum:
                    - cosine
                    - dot
                    - euclid
                    type: string
                  endpoint:
                    description: |-
                      Endpoint of the vector store, e.g. "http://qdrant:6333" or a
                      "postgresql://host/db" DSN for pgvector.
                    type: string
                  type:
                    default: qdrant
                    description: VectorStoreType enumerates supported vector databases.
                    enum:
                    - qdrant
                    - pgvector
                    - milvus
                    type: string
                required:
                - endpoint
                - type
                type: object
            required:
            - dimension
            - knowledgeBaseRef
            - store
            type: object
          status:
            description: VectorIndexStatus is the observed collection state.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              dimension:
                type: integer
              health:
                description: VectorIndexHealth is the observed health of the collection.
                enum:
                - Healthy
                - Degraded
                - Missing
                - Unknown
                type: string
              lastProbeTime:
                format: date-time
                type: string
              message:
                type: string
              pointCount:
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
