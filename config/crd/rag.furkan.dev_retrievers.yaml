---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: retrievers.rag.furkan.dev
spec:
  group: rag.furkan.dev
  names:
    kind: Retriever
    listKind: RetrieverList
    plural: retrievers
    shortNames:
    - rtr
    singular: retriever
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.knowledgeBaseRef.name
      name: KnowledgeBase
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.serviceEndpoint
      name: Endpoint
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Retriever serves low-latency retrieval over a KnowledgeBase.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RetrieverSpec declares a serving endpoint over a KnowledgeBase.
            properties:
              generation:
                description: Generation, when set, enables LLM answer synthesis over
                  retrieved chunks.
                properties:
                  apiKeySecretRef:
                    description: |-
                      APIKeySecretRef holds the chat provider API key. Optional for local
                      OpenAI-compatible servers (Ollama, vLLM, LM Studio) that need no auth.
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  baseURL:
                    description: BaseURL overrides the provider's API base URL (required
                      for openai-compatible).
                    type: string
                  enabled:
                    default: true
                    type: boolean
                  maxTokens:
                    default: 512
                    description: MaxTokens caps the generated answer length.
                    type: integer
                  model:
                    description: |-
                      Model name, e.g. "gpt-4o-mini", "google/gemini-2.0-flash-exp:free",
                      "llama-3.3-70b-versatile", "gemini-2.0-flash".
                    type: string
                  provider:
                    description: |-
                      Provider of the chat model (all spoken via the OpenAI-compatible API):
                        openai | openrouter | groq | gemini | openai-compatible
                    enum:
                    - openai
                    - openrouter
                    - groq
                    - gemini
                    - openai-compatible
                    type: string
                  systemPrompt:
                    description: SystemPrompt overrides the default grounding instruction.
                    type: string
                required:
                - model
                - provider
                type: object
              image:
                description: Image overrides the retriever server image.
                type: string
              knowledgeBaseRef:
                description: KnowledgeBaseRef names the KnowledgeBase to serve from
                  (same namespace).
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              replicas:
                default: 1
                description: Replicas of the retriever server.
                format: int32
                minimum: 0
                type: integer
              rerank:
                description: RerankSpec configures optional cross-encoder reranking
                  of retrieved chunks.
                properties:
                  enabled:
                    default: false
                    type: boolean
                  model:
                    default: bge-reranker-base
                    description: Model is the reranker model name (e.g. "bge-reranker-base").
                    type: string
                type: object
              scoreThresholdPercent:
                description: ScoreThresholdPercent drops results below this similarity
                  (0-100).
                maximum: 100
                minimum: 0
                type: integer
              topK:
                default: 8
                description: TopK is the default number of chunks returned per query.
                minimum: 1
                type: integer
            required:
            - knowledgeBaseRef
            type: object
          status:
            description: RetrieverStatus is the observed serving state.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                format: int64
                type: integer
              phase:
                type: string
              readyReplicas:
                format: int32
                type: integer
              serviceEndpoint:
                description: ServiceEndpoint is the in-cluster URL of the retriever,
                  when available.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      scale:
        specReplicasPath: .spec.replicas
        statusReplicasPath: .status.readyReplicas
      status: {}
