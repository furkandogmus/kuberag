---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: knowledgebases.rag.furkan.dev
spec:
  group: rag.furkan.dev
  names:
    kind: KnowledgeBase
    listKind: KnowledgeBaseList
    plural: knowledgebases
    shortNames:
    - kb
    singular: knowledgebase
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.observedEmbeddingModel
      name: Model
      type: string
    - jsonPath: .status.indexedChunks
      name: Chunks
      type: integer
    - jsonPath: .status.evaluation.recallPercent
      name: Recall
      type: integer
    - jsonPath: .status.lastIndexedTime
      name: LastIndexed
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: KnowledgeBase is a declarative, reconciled RAG knowledge source.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: KnowledgeBaseSpec is the desired knowledge state.
            properties:
              chunking:
                description: ChunkingSpec controls how source documents are split
                  into chunks.
                properties:
                  maxTokens:
                    default: 800
                    minimum: 1
                    type: integer
                  overlap:
                    default: 80
                    minimum: 0
                    type: integer
                  strategy:
                    default: semantic
                    description: ChunkingStrategy enumerates how documents get split.
                    enum:
                    - semantic
                    - recursive
                    - fixed
                    type: string
                type: object
              embedding:
                description: EmbeddingSpec selects the embedding model. Changing Model
                  triggers a full re-embed.
                properties:
                  apiKeySecretRef:
                    description: APIKeySecretRef holds the provider API key when Provider
                      != local.
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  baseURL:
                    description: |-
                      BaseURL overrides the API base URL. Required for "openai-compatible";
                      optional override for the other hosted providers.
                    type: string
                  dimension:
                    description: |-
                      Dimension overrides the vector dimension. If unset it is taken from a
                      built-in table for known models, otherwise auto-detected at ingest time.
                    minimum: 1
                    type: integer
                  model:
                    default: bge-small
                    description: Model name, e.g. "bge-small", "bge-large", "text-embedding-3-small".
                    type: string
                  provider:
                    default: local
                    description: |-
                      Provider of the model:
                        local            - run the model in-process via fastembed
                        openai           - OpenAI embeddings API
                        gemini           - Google Gemini embeddings (OpenAI-compatible endpoint)
                        openai-compatible- any OpenAI-compatible /embeddings endpoint (set baseURL)
                    enum:
                    - local
                    - openai
                    - gemini
                    - openai-compatible
                    type: string
                required:
                - model
                type: object
              freshness:
                description: FreshnessSpec controls how often the source is re-synced.
                properties:
                  schedule:
                    description: Schedule is a standard cron expression (5 fields).
                      Empty disables scheduled reindexing.
                    type: string
                type: object
              ingestion:
                description: IngestionSpec tunes how ingestion Jobs run.
                properties:
                  mode:
                    default: incremental
                    description: |-
                      Mode "incremental" only re-embeds changed/added chunks and deletes removed ones.
                      "full" recreates the collection every run.
                    enum:
                    - full
                    - incremental
                    type: string
                  resources:
                    description: Resources for the ingestion worker pod.
                    properties:
                      cpu:
                        type: string
                      memory:
                        type: string
                    type: object
                  serviceAccountName:
                    description: ServiceAccountName runs the ingestion Job under a
                      specific SA (e.g. for IRSA).
                    type: string
                type: object
              retrievalQuality:
                description: RetrievalQualitySpec enables periodic evaluation and
                  optional auto-tuning.
                properties:
                  autoTune:
                    description: AutoTuneSpec controls automatic chunking adjustments
                      to hit a recall target.
                    properties:
                      enabled:
                        default: false
                        type: boolean
                      maxAttempts:
                        default: 3
                        description: MaxAttempts bounds how many tuning iterations
                          the operator will try.
                        minimum: 1
                        type: integer
                    type: object
                  datasetRef:
                    description: |-
                      DatasetRef references a ConfigMap with key "dataset.jsonl"; each line is
                      {"query": "...", "expectedSources": ["path/a", "path/b"]}.
                    properties:
                      name:
                        type: string
                    required:
                    - name
                    type: object
                  enabled:
                    default: true
                    type: boolean
                  evalSchedule:
                    description: EvalSchedule is a cron expression for running evaluations.
                    type: string
                  minimumRecallPercent:
                    description: |-
                      MinimumRecallPercent is the recall@TopK target (0-100). Below this the KB is
                      marked degraded and, if AutoTune is enabled, the operator adjusts chunking.
                    maximum: 100
                    minimum: 0
                    type: integer
                  topK:
                    default: 8
                    description: TopK used during evaluation retrieval.
                    type: integer
                required:
                - datasetRef
                type: object
              sources:
                items:
                  description: Source describes one place to pull documents from.
                  properties:
                    github:
                      description: GitHubSource points at a GitHub repository.
                      properties:
                        includeGlobs:
                          description: IncludeGlobs limits ingestion to matching paths
                            (e.g. "docs/**", "**/*.md").
                          items:
                            type: string
                          type: array
                        ref:
                          description: Ref is the branch, tag or commit to ingest.
                            Defaults to the repo default branch.
                          type: string
                        repo:
                          description: Repo in "owner/name" form, e.g. "qdrant/qdrant".
                          type: string
                        tokenSecretRef:
                          description: TokenSecretRef references a Secret key holding
                            a GitHub token for private repos.
                          properties:
                            key:
                              type: string
                            name:
                              type: string
                          required:
                          - key
                          - name
                          type: object
                      required:
                      - repo
                      type: object
                    name:
                      description: |-
                        Name uniquely identifies this source within the KnowledgeBase. Used to
                        track per-source sync state for incremental ingestion.
                      minLength: 1
                      type: string
                    s3:
                      description: S3Source points at objects in an S3-compatible
                        bucket.
                      properties:
                        accessKeySecretRef:
                          description: |-
                            AccessKeySecretRef and SecretKeySecretRef hold credentials. If unset, the
                            worker falls back to the ambient credential chain (IRSA, instance role).
                          properties:
                            key:
                              type: string
                            name:
                              type: string
                          required:
                          - key
                          - name
                          type: object
                        bucket:
                          type: string
                        endpoint:
                          description: Endpoint for S3-compatible stores (e.g. MinIO).
                            Empty means AWS S3.
                          type: string
                        includeGlobs:
                          items:
                            type: string
                          type: array
                        prefix:
                          type: string
                        region:
                          type: string
                        secretKeySecretRef:
                          description: SecretKeyRef points at a single key inside
                            a Secret in the same namespace.
                          properties:
                            key:
                              type: string
                            name:
                              type: string
                          required:
                          - key
                          - name
                          type: object
                      required:
                      - bucket
                      type: object
                    type:
                      description: Type of the source.
                      enum:
                      - github
                      - s3
                      - web
                      type: string
                    web:
                      description: WebSource crawls one or more seed URLs.
                      properties:
                        maxDepth:
                          default: 1
                          description: MaxDepth bounds link-following from each seed.
                            0 means only the seed pages.
                          minimum: 0
                          type: integer
                        maxPages:
                          default: 200
                          description: MaxPages caps the total number of fetched pages.
                          type: integer
                        sameDomainOnly:
                          default: true
                          description: SameDomainOnly restricts crawling to the seed's
                            domain.
                          type: boolean
                        urls:
                          items:
                            type: string
                          minItems: 1
                          type: array
                      required:
                      - urls
                      type: object
                  required:
                  - name
                  - type
                  type: object
                  x-kubernetes-validations:
                  - message: github block required when type is github
                    rule: self.type != 'github' || has(self.github)
                  - message: s3 block required when type is s3
                    rule: self.type != 's3' || has(self.s3)
                  - message: web block required when type is web
                    rule: self.type != 'web' || has(self.web)
                minItems: 1
                type: array
              suspend:
                description: Suspend pauses all reconciliation actions (no new Jobs)
                  when true.
                type: boolean
              vectorStore:
                description: VectorStoreSpec describes where embeddings are written.
                properties:
                  collection:
                    description: Collection (or table) name. Defaults to the KnowledgeBase
                      name.
                    type: string
                  credentialsSecretRef:
                    description: CredentialsSecretRef holds a password/API key for
                      the store when needed.
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  distance:
                    default: cosine
                    description: DistanceMetric enumerates supported vector distance
                      metrics.
                    enum:
                    - cosine
                    - dot
                    - euclid
                    type: string
                  endpoint:
                    description: |-
                      Endpoint of the vector store, e.g. "http://qdrant:6333" or a
                      "postgresql://host/db" DSN for pgvector.
                    type: string
                  type:
                    default: qdrant
                    description: VectorStoreType enumerates supported vector databases.
                    enum:
                    - qdrant
                    - pgvector
                    - milvus
                    type: string
                required:
                - endpoint
                - type
                type: object
              workerImage:
                description: WorkerImage overrides the ingestion/eval worker container
                  image.
                type: string
            required:
            - embedding
            - sources
            - vectorStore
            type: object
          status:
            description: KnowledgeBaseStatus is the observed knowledge state.
            properties:
              activeJob:
                description: ActiveJob is the name of the in-flight ingestion/eval
                  Job, if any.
                type: string
              autoTuneAttempts:
                description: AutoTuneAttempts counts auto-tune iterations applied
                  so far.
                type: integer
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              effectiveChunking:
                description: EffectiveChunking is the chunking actually in use (spec,
                  possibly auto-tuned).
                properties:
                  maxTokens:
                    default: 800
                    minimum: 1
                    type: integer
                  overlap:
                    default: 80
                    minimum: 0
                    type: integer
                  strategy:
                    default: semantic
                    description: ChunkingStrategy enumerates how documents get split.
                    enum:
                    - semantic
                    - recursive
                    - fixed
                    type: string
                type: object
              evalRound:
                description: |-
                  EvalRound increments per evaluation run so each eval Job gets a unique name
                  (the spec hash alone is stable across repeated evaluations).
                type: integer
              evaluation:
                description: EvaluationStatus records the most recent retrieval-quality
                  run.
                properties:
                  p95LatencyMillis:
                    type: integer
                  queries:
                    type: integer
                  recallPercent:
                    type: integer
                  time:
                    format: date-time
                    type: string
                type: object
              indexedChunks:
                description: IndexedChunks is the total number of chunks in the store
                  after the last run.
                type: integer
              lastIndexedTime:
                format: date-time
                type: string
              observedEmbeddingModel:
                description: ObservedEmbeddingModel is the model used for the data
                  currently in the store.
                type: string
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
              observedSpecHash:
                description: ObservedSpecHash fingerprints the re-ingest-relevant
                  spec fields.
                type: string
              phase:
                description: KnowledgeBasePhase is a coarse, human-readable lifecycle
                  state.
                enum:
                - Pending
                - Ingesting
                - Ready
                - Degraded
                - Failed
                - Suspended
                type: string
              sources:
                items:
                  description: SourceStatus tracks the last-synced fingerprint per
                    source for incremental sync.
                  properties:
                    chunks:
                      type: integer
                    name:
                      type: string
                    revision:
                      description: Revision is the source-specific marker last ingested
                        (git SHA, S3 ETag set hash, crawl hash).
                      type: string
                  required:
                  - name
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
