apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kuberag-retrievers
  namespace: kuberag-system
  labels:
    app.kubernetes.io/name: kuberag
spec:
  namespaceSelector:
    any: true
  selector:
    matchLabels:
      app.kubernetes.io/component: retriever-metrics
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
