apiVersion: v1
kind: Namespace
metadata:
  name: kuberag-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kuberag-controller-manager
  namespace: kuberag-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kuberag-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kuberag-role
subjects:
  - kind: ServiceAccount
    name: kuberag-controller-manager
    namespace: kuberag-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuberag-controller-manager
  namespace: kuberag-system
  labels:
    app.kubernetes.io/name: kuberag
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kuberag
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kuberag
    spec:
      serviceAccountName: kuberag-controller-manager
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: ghcr.io/furkandogmus/kuberag:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          args:
            - --leader-elect
          ports:
            - containerPort: 8080
              name: metrics
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
