apiVersion: v1
kind: Namespace
metadata:
  name: rag-operator-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rag-operator-controller-manager
  namespace: rag-operator-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rag-operator-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rag-operator-role
subjects:
  - kind: ServiceAccount
    name: rag-operator-controller-manager
    namespace: rag-operator-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-operator-controller-manager
  namespace: rag-operator-system
  labels:
    app.kubernetes.io/name: rag-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rag-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-operator
    spec:
      serviceAccountName: rag-operator-controller-manager
      securityContext:
        runAsNonRoot: true
      containers:
        - name: manager
          image: ghcr.io/furkandogmus/rag-operator:latest
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect
          ports:
            - containerPort: 8080
              name: metrics
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
