version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: "/worker"
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]
    # The ML/serving stack is tightly version-coupled and validated end-to-end;
    # the unit-test CI doesn't import these, so bumps are made deliberately.
    ignore:
      - dependency-name: fastembed
      - dependency-name: pymilvus
      - dependency-name: marshmallow
      - dependency-name: setuptools
      - dependency-name: openai
      - dependency-name: httpx
      - dependency-name: qdrant-client

  - package-ecosystem: docker
    directories:
      - "/"
      - "/worker"
    schedule:
      interval: weekly
    # Base-image major bumps (e.g. python 3.12 -> 3.14) outrun the ML wheels;
    # take patch/minor only.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
