version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: "/worker"
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]
    # The ML/serving stack is tightly version-coupled. Dependabot will open PRs;
    # pip-audit in CI catches known vulnerabilities so bumps are auditable.
    ignore:
      - dependency-name: marshmallow
      - dependency-name: setuptools

  - package-ecosystem: docker
    directories:
      - "/"
      - "/worker"
    schedule:
      interval: weekly
    groups:
      docker:
        patterns: ["*"]
