name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".gitignore"
      - ".dockerignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".gitignore"
      - ".dockerignore"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # Build golangci-lint from source with the repo's Go toolchain. Prebuilt
      # releases lag new Go versions and refuse a higher `go` directive, so
      # `go run` (compiled with the same toolchain) is the reliable path.
      - name: golangci-lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run ./...

  go:
    name: go (build, unit + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: test -z "$(gofmt -l .)" || (echo "::error::gofmt needed:"; gofmt -l .; exit 1)

      - name: go vet
        run: go vet ./...

      - name: govulncheck
        continue-on-error: true
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: build
        run: go build ./...

      - name: helm lint
        run: make lint-helm

      - name: generated artifacts up to date
        run: |
          go run sigs.k8s.io/controller-tools/cmd/controller-gen@v0.16.5 object:headerFile=/dev/null paths="./api/..."
          go run sigs.k8s.io/controller-tools/cmd/controller-gen@v0.16.5 crd rbac:roleName=kuberag-role paths="./..." \
            output:crd:artifacts:config=config/crd output:rbac:artifacts:config=config/rbac
          git diff --exit-code || (echo "::error::CRD/RBAC/deepcopy out of date — run 'make manifests generate'"; exit 1)

      - name: API reference up to date
        run: |
          python3 -m pip install --quiet -r worker/requirements-test.txt
          make api-docs
          git diff --exit-code || (echo "::error::docs/API.md out of date — run 'make api-docs'"; exit 1)

      - name: unit tests with coverage
        run: |
          go test -count=1 -coverprofile=cover.out -covermode=atomic ./...
          TOTAL=$(go tool cover -func=cover.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')
          echo "Total coverage: ${TOTAL}%"
          # Fail if total coverage drops below the configured minimum.
          # The default 10% is intentionally low to start; bump via
          # MIN_COVERAGE env as coverage grows. Internal package
          # targets (e.g. controller at 50%) should be tracked
          # separately.
          MIN_COVERAGE="${MIN_COVERAGE:-10}"
          awk -v t="$TOTAL" -v m="$MIN_COVERAGE" 'BEGIN { if (t+0 < m+0) { print "::error::Coverage " t "% below minimum " m "%"; exit 1 } }'

      - name: upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: cover.out
          retention-days: 14

      - name: integration tests (envtest)
        run: |
          export KUBEBUILDER_ASSETS="$(go run sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.19 use 1.31.0 -p path)"
          go test -tags=integration -count=1 -timeout=300s ./internal/controller/...

  python:
    name: python (tests + pip-audit)
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
      pgvector:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: worker
        run: python -m pip install -r requirements.txt -r requirements-test.txt
      - name: worker tests
        working-directory: worker
        run: python -m unittest tests.test_chunking tests.test_globs tests.test_ingest tests.test_server tests.test_sources tests.test_stores -v
        env:
          PYTHONWARNINGS: ignore::DeprecationWarning
      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:6333/healthz > /dev/null 2>&1; then
              echo "Qdrant ready"; break
            fi
            echo "waiting for Qdrant... $i"; sleep 3
          done
      - name: Wait for pgvector
        run: |
          for i in $(seq 1 20); do
            if pg_isready -h localhost -p 5432 > /dev/null 2>&1; then
              echo "pgvector ready"; break
            fi
            echo "waiting for pgvector... $i"; sleep 3
          done
      - name: Real store integration tests
        working-directory: worker
        env:
          QDRANT_ENDPOINT: http://localhost:6333
          PGVECTOR_DSN: postgresql://postgres:postgres@localhost:5432/postgres
        run: python -m unittest tests.test_stores_integration -v
      - name: pip-audit (worker)
        working-directory: worker
        run: |
          python -m pip install pip-audit
          # setuptools pinned at 80.10.2 for pymilvus compat; CVEs accepted.
          python -m pip_audit -r requirements.txt || true
      - name: pip-audit (retriever)
        working-directory: worker
        run: python -m pip_audit -r requirements-retriever.txt || true

  container-scan:
    name: container vulnerability scan
    runs-on: ubuntu-latest
    needs: [go, python]
    steps:
      - uses: actions/checkout@v6
      - name: Build operator image
        run: docker build -t kuberag:latest .
      - name: Scan operator image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: kuberag:latest
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL
      - name: Build worker image
        run: docker build -t kuberag-worker:latest -f worker/Dockerfile worker/
      - name: Scan worker image (advisory)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: kuberag-worker:latest
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: HIGH,CRITICAL
      - name: Build retriever image
        run: docker build -t kuberag-retriever:latest -f worker/Dockerfile.retriever worker/
      - name: Scan retriever image (advisory)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: kuberag-retriever:latest
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  e2e:
    name: e2e (k3d)
    runs-on: ubuntu-latest
    needs: [lint, go, python]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Create k3d cluster
        run: |
          curl -fsSL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d cluster create e2e --wait
          mkdir -p ~/.kube && k3d kubeconfig merge e2e -o ~/.kube/config

      - name: Install CRDs and RBAC
        run: |
          kubectl apply -f config/crd
          kubectl apply -f config/rbac/role.yaml
          kubectl apply -f config/rbac/priority-class.yaml
          kubectl create namespace kuberag-system --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f config/rbac/leader_election_role.yaml
          kubectl apply -f config/rbac/worker_rbac.yaml -n default

      - name: Start operator
        run: |
          go run ./cmd &
          sleep 5

      - name: Deploy Qdrant and e2e-test resources
        run: |
          kubectl apply -f config/samples/qdrant.yaml
          kubectl apply -f config/samples/e2e-test.yaml

      - name: Wait for ingestion to complete
        timeout-minutes: 10
        run: |
          kubectl wait --for=jsonpath='{.status.phase}'=Ready kb/e2e-docs --timeout=300s
          kubectl get kb,vi,rtr

      - name: Query retriever and assert chunks indexed
        run: |
          kubectl rollout status deploy/e2e-docs-retriever --timeout=120s
          kubectl port-forward svc/e2e-docs-retriever 8000:8000 &
          sleep 4
          RESP=$(curl -s http://localhost:8000/query -H 'content-type: application/json' \
            -d '{"query":"machine learning resources","topK":3}')
          echo "$RESP" | jq .
          CHUNKS=$(kubectl get kb e2e-docs -o jsonpath='{.status.indexedChunks}')
          echo "indexedChunks=$CHUNKS"
          if [ "$CHUNKS" -gt 0 ]; then
            echo "PASS: indexed $CHUNKS chunks"
          else
            echo "FAIL: no chunks indexed"
            exit 1
          fi
