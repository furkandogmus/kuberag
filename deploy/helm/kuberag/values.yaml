# Default values for kuberag.
# Declare variables to be passed into your templates.

# -- Number of operator replicas (leader-elected, keep at 1).
replicaCount: 1

image:
  repository: ghcr.io/furkandogmus/kuberag
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Operator resource requests and limits.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# -- Controller arguments.
args:
  - --leader-elect
  - --metrics-bind-address=:8080
  - --health-probe-bind-address=:8081

# Metrics service.
metrics:
  service:
    port: 8080
  serviceMonitor:
    enabled: false
    interval: 30s
  retrieverServiceMonitor:
    enabled: false
    interval: 30s
  prometheusRule:
    enabled: false
    # Alert when no successful ingestion has occurred in a namespace for this
    # many seconds. Tune to your slowest expected freshness schedule.
    ingestionFreshnessSeconds: 86400

# Leader election configuration.
leaderElection:
  enabled: true

# PriorityClass configuration.
priorityClass:
  enabled: true
  name: kuberag-system
  value: 1000000

# NetworkPolicy configuration.
networkPolicy:
  enabled: false

# RBAC configuration.
rbac:
  create: true
  # cluster: watch all namespaces with ClusterRole/ClusterRoleBinding.
  # namespace: watch one namespace with Role/RoleBinding.
  scope: cluster
  # Defaults to the Helm release namespace when scope=namespace.
  watchNamespace: ""

serviceAccount:
  create: true
  name: kuberag-controller-manager

# Legacy shared Worker ServiceAccount/RBAC. Disabled by default because the
# operator now creates a least-privilege ServiceAccount per KnowledgeBase.
# Enable only for KnowledgeBases that explicitly set serviceAccountName below.
worker:
  serviceAccountName: kuberag-worker
  namespaces:
    - default
  rbac:
    create: false

# Pod security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Container security context.
securityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Pod annotations and labels.
podAnnotations: {}
podLabels: {}

# Node selector, tolerations, and affinity for the operator pod.
nodeSelector: {}
tolerations: []
affinity: {}

# Termination grace period.
terminationGracePeriodSeconds: 60

# Protect the operator leader from voluntary disruption during node drains.
podDisruptionBudget:
  enabled: true
  minAvailable: 1
