                  long the ladder has been running. Useful for SLI dashboards
                  ("auto-tune convergence time") and alerting when a run exceeds
                  expected duration.
                format: date-time
                type: string
              bestChunking:
                description: |-
                  BestChunking is the chunking that achieved BestRecallPercent. When auto-tune
                  exhausts its attempts without meeting the target, the operator lands the KB
                  on this configuration rather than the last (arbitrary) ladder step.
                properties:
                  maxTokens:
                    default: 800
                    minimum: 1
                    type: integer
                  overlap:
                    default: 80
                    minimum: 0
                    type: integer
                  strategy:
                    default: semantic
                    description: ChunkingStrategy enumerates how documents get split.
                    enum:
                    - semantic
                    - recursive
                    - fixed
                    type: string
                type: object
                x-kubernetes-validations:
                - message: overlap must be strictly less than maxTokens
                  rule: self.overlap < self.maxTokens
              bestRecallPercent:
                description: BestRecallPercent is the highest recall observed across
                  auto-tune attempts.
                type: integer
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              effectiveChunking:
                description: EffectiveChunking is the chunking actually in use (spec,
                  possibly auto-tuned).
                properties:
                  maxTokens:
                    default: 800
                    minimum: 1
                    type: integer
                  overlap:
                    default: 80
                    minimum: 0
                    type: integer
                  strategy:
                    default: semantic
                    description: ChunkingStrategy enumerates how documents get split.
                    enum:
                    - semantic
                    - recursive
                    - fixed
                    type: string
                type: object
                x-kubernetes-validations:
                - message: overlap must be strictly less than maxTokens
                  rule: self.overlap < self.maxTokens
              evalRound:
                description: |-
                  EvalRound increments per evaluation run so each eval Job gets a unique name
                  (the spec hash alone is stable across repeated evaluations).
                type: integer
              evaluation:
                description: EvaluationStatus records the most recent retrieval-quality
                  run.
                properties:
                  p95LatencyMillis:
                    type: integer
                  queries:
                    type: integer
                  recallPercent:
                    type: integer
                  time:
                    format: date-time
                    type: string
                type: object
              indexedChunks:
                description: IndexedChunks is the total number of chunks in the store
                  after the last run.
                type: integer
              ingestRound:
                description: |-
                  IngestRound increments for every ingestion attempt so retries never
                  collide with a still-present finished Job.
                type: integer
              lastFailedSpecHash:
                description: |-
                  LastFailedSpecHash fingerprints the corpus spec used by the most recent
                  failed ingestion.
                type: string
              lastFailureTime:
                description: LastFailureTime is when the most recent ingestion failed.
                format: date-time
                type: string
              lastIndexedTime:
                format: date-time
                type: string
              observedEmbedding:
                description: |-
                  ObservedEmbedding is the full embedding config of the indexed data.
                  Used by the Retriever to query with the same provider/model/prefixes.
                properties:
                  apiKeySecretRef:
                    description: APIKeySecretRef holds the provider API key when Provider
                      != local.
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  baseURL:
                    description: |-
                      BaseURL overrides the API base URL. Required for "openai-compatible";
                      optional override for the other hosted providers.
                    type: string
                  dimension:
                    description: |-
                      Dimension overrides the vector dimension. If unset it is taken from a
                      built-in table for known models, otherwise auto-detected at ingest time.
                    minimum: 1
                    type: integer
                  documentPrefix:
                    description: 'DocumentPrefix prepends to every document before
                      embedding (e.g. "passage: ").'
                    type: string
                  model:
                    default: bge-small
                    description: Model name, e.g. "bge-small", "bge-large", "text-embedding-3-small".
                    type: string
                  provider:
                    default: local
                    description: |-
                      Provider of the model:
                        local            - run the model in-process via fastembed
                        openai           - OpenAI embeddings API
                        gemini           - Google Gemini embeddings (OpenAI-compatible endpoint)
                        openai-compatible- any OpenAI-compatible /embeddings endpoint (set baseURL)
                    enum:
                    - local
                    - openai
                    - gemini
                    - openai-compatible
                    type: string
                  queryPrefix:
                    description: |-
                      QueryPrefix prepends to every query before embedding (e.g. "query: ").
                      Useful for BGE/Instructor-style models that use instruction prefixes.
                    type: string
                required:
                - model
                type: object
                x-kubernetes-validations:
                - message: baseURL is required when provider is openai-compatible
                  rule: self.provider != 'openai-compatible' || (has(self.baseURL)
                    && size(self.baseURL) > 0)
              observedEmbeddingModel:
                description: ObservedEmbeddingModel is the model used for the data
                  currently in the store.
                type: string
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
              observedSecretsHash:
                description: |-
                  ObservedSecretsHash fingerprints the last ingested credential values.
                  A change cancels any in-flight ingest Job but does not trigger re-indexing
                  on its own — credentials are injected at Job start time.
                type: string
              observedSpecHash:
                description: |-
                  ObservedSpecHash fingerprints the corpus-relevant spec fields (sources,
                  chunking, embedding, vector store). Secret values are excluded so credential
                  rotation does not force a full re-index.
                type: string
              pendingRetune:
                description: |-
                  PendingRetune marks that auto-tune has changed the effective chunking and a
                  re-index is owed, without disturbing ObservedSpecHash (which keeps tracking
                  the last ingested spec so user spec edits are still detected mid-tune).
                type: boolean
              phase:
                description: KnowledgeBasePhase is a coarse, human-readable lifecycle
                  state.
                enum:
                - Pending
                - Ingesting
                - Ready
                - Degraded
                - Failed
                - Suspended
                type: string
              sources:
                items:
                  description: SourceStatus tracks the last-synced fingerprint per
                    source for incremental sync.
                  properties:
                    chunks:
                      type: integer
                    name:
                      type: string
                    revision:
                      description: Revision is the source-specific marker last ingested
                        (git SHA, S3 ETag set hash, crawl hash).
                      type: string
                  required:
                  - name
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
