    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: KnowledgeBase is a declarative, reconciled RAG knowledge source.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: KnowledgeBaseSpec is the desired knowledge state.
            properties:
              chunking:
                description: ChunkingSpec controls how source documents are split
                  into chunks.
                properties:
                  maxTokens:
                    default: 800
                    minimum: 1
                    type: integer
                  overlap:
                    default: 80
                    minimum: 0
                    type: integer
                  strategy:
                    default: semantic
                    description: ChunkingStrategy enumerates how documents get split.
                    enum:
                    - semantic
                    - recursive
                    - fixed
                    type: string
                type: object
                x-kubernetes-validations:
                - message: overlap must be strictly less than maxTokens
                  rule: self.overlap < self.maxTokens
              embedding:
                description: EmbeddingSpec selects the embedding model. Changing Model
                  triggers a full re-embed.
                properties:
                  apiKeySecretRef:
                    description: APIKeySecretRef holds the provider API key when Provider
                      != local.
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  baseURL:
                    description: |-
                      BaseURL overrides the API base URL. Required for "openai-compatible";
                      optional override for the other hosted providers.
                    type: string
                  dimension:
                    description: |-
                      Dimension overrides the vector dimension. If unset it is taken from a
                      built-in table for known models, otherwise auto-detected at ingest time.
                    minimum: 1
                    type: integer
                  documentPrefix:
                    description: 'DocumentPrefix prepends to every document before
                      embedding (e.g. "passage: ").'
                    type: string
                  model:
                    default: bge-small
                    description: Model name, e.g. "bge-small", "bge-large", "text-embedding-3-small".
                    type: string
                  provider:
                    default: local
                    description: |-
                      Provider of the model:
                        local            - run the model in-process via fastembed
                        openai           - OpenAI embeddings API
                        gemini           - Google Gemini embeddings (OpenAI-compatible endpoint)
                        openai-compatible- any OpenAI-compatible /embeddings endpoint (set baseURL)
                    enum:
                    - local
                    - openai
                    - gemini
                    - openai-compatible
                    type: string
                  queryPrefix:
                    description: |-
                      QueryPrefix prepends to every query before embedding (e.g. "query: ").
                      Useful for BGE/Instructor-style models that use instruction prefixes.
                    type: string
                required:
                - model
                type: object
                x-kubernetes-validations:
