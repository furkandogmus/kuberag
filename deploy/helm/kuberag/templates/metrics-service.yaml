apiVersion: v1
kind: Service
metadata:
  name: {{ include "kuberag.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kuberag.labels" . | nindent 4 }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ .Values.metrics.service.port | quote }}
    prometheus.io/path: "/metrics"
spec:
  selector:
    {{- include "kuberag.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.metrics.service.port }}
      targetPort: metrics
