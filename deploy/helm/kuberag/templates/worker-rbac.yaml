{{- if .Values.worker.rbac.create }}
{{- range $namespace := .Values.worker.namespaces }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $.Values.worker.serviceAccountName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "kuberag.labels" $ | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kuberag.fullname" $ }}-worker
  namespace: {{ $namespace }}
  labels:
    {{- include "kuberag.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kuberag.fullname" $ }}-worker
  namespace: {{ $namespace }}
  labels:
    {{- include "kuberag.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kuberag.fullname" $ }}-worker
subjects:
  - kind: ServiceAccount
    name: {{ $.Values.worker.serviceAccountName }}
    namespace: {{ $namespace }}
{{- end }}
{{- end }}
