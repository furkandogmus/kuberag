{{- if .Values.priorityClass.enabled }}
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: {{ .Values.priorityClass.name }}
  labels:
    {{- include "kuberag.labels" . | nindent 4 }}
value: {{ .Values.priorityClass.value }}
globalDefault: false
description: "kuberag operator and serving components — should not be preempted."
{{- end }}
