{{- if .Values.metrics.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "kuberag.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kuberag.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "kuberag.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      interval: {{ .Values.metrics.serviceMonitor.interval }}
      path: /metrics
{{- end }}
