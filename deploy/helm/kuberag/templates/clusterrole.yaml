{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: {{ if eq .Values.rbac.scope "namespace" }}Role{{ else }}ClusterRole{{ end }}
metadata:
  name: {{ include "kuberag.fullname" . }}-role
  {{- if eq .Values.rbac.scope "namespace" }}
  namespace: {{ default .Release.Namespace .Values.rbac.watchNamespace }}
  {{- end }}
  labels:
    {{- include "kuberag.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
      - serviceaccounts
      - services
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - roles
      - rolebindings
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
      - events.k8s.io
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - autoscaling
    resources:
      - horizontalpodautoscalers
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - policy
    resources:
      - poddisruptionbudgets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
      - networkpolicies
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - rag.furkan.dev
    resources:
      - knowledgebases
      - retrievers
      - vectorindices
      - ingestionruns
      - backups
      - restores
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - rag.furkan.dev
    resources:
      - knowledgebases/finalizers
      - backups/finalizers
      - restores/finalizers
    verbs:
      - update
  - apiGroups:
      - rag.furkan.dev
    resources:
      - knowledgebases/status
      - retrievers/status
      - vectorindices/status
      - ingestionruns/status
      - backups/status
      - restores/status
    verbs:
      - get
      - patch
      - update
{{- end }}
