{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kuberag.fullname" . }}-rolebinding
  labels:
    {{- include "kuberag.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kuberag.fullname" . }}-role
subjects:
  - kind: ServiceAccount
    name: {{ include "kuberag.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
