{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: {{ if eq .Values.rbac.scope "namespace" }}RoleBinding{{ else }}ClusterRoleBinding{{ end }}
metadata:
  name: {{ include "kuberag.fullname" . }}-rolebinding
  {{- if eq .Values.rbac.scope "namespace" }}
  namespace: {{ default .Release.Namespace .Values.rbac.watchNamespace }}
  {{- end }}
  labels:
    {{- include "kuberag.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: {{ if eq .Values.rbac.scope "namespace" }}Role{{ else }}ClusterRole{{ end }}
  name: {{ include "kuberag.fullname" . }}-role
subjects:
  - kind: ServiceAccount
    name: {{ include "kuberag.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
